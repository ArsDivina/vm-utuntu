services:
  ubchrome:
    image: dockerhubatbasrco/ubchrome:${UBCHROME_VERSION:-latest}
    platform: linux/amd64
    ports:
      - "3010-3012:3000"  # Each instance gets a unique host port (3010, 3011, 3012)
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
      - SUBFOLDER=/
      - TITLE=Ubuntu Chrome Desktop
      # Catalyst Edge Node config — set these to activate the edge runtime
      - EDGE_ID=${EDGE_ID:-}
      - ORG_ID=${ORG_ID:-}
      - DP_URL=${DP_URL:-}
      - BOOTSTRAP_SECRET=${BOOTSTRAP_SECRET:-}   # one-time first-boot only; remove after
    volumes:
      # Edge source — bind-mount from darkfleet repo checkout on the host
      - ${DARKFLEET_PATH:-/opt/darkfleet}/catalyst/bridge/src:/app/edge/src:ro
      # Edge spool — persists session checkpoints across container restarts
      - catalyst-edge-spool:/var/lib/catalyst-edge
    shm_size: 2g
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.0

volumes:
  catalyst-edge-spool:
